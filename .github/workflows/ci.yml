name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  lint:
    name: Линтер
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1

  test:
    name: Тесты
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tgops
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: tgops_test
        options: >-
          --health-cmd "pg_isready -U tgops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Загрузка зависимостей
        run: go mod download

      - name: Запуск тестов
        run: go test -race -coverprofile=coverage.out ./...
        env:
          TEST_DATABASE_DSN: postgres://tgops:testpass@localhost:5432/tgops_test?sslmode=disable

      - name: Покрытие кода
        run: go tool cover -func=coverage.out

  build:
    name: Сборка
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: go build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/tgops

  release:
    name: Сборка, пуш образа, деплой
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    env:
      REGISTRY: europe-west3-docker.pkg.dev
      IMAGE: europe-west3-docker.pkg.dev/tgops-prod/tgops-images/tgops
    steps:
      - uses: actions/checkout@v4

      # вход в gcp без ключей, через workload identity federation
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: docker login в artifact registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: сборка образа
        run: docker build -f deployments/Dockerfile -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .

      # скан уязвимостей, не блокирует (отчёт)
      - name: trivy scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL

      - name: пуш образа
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # дёргаем jenkins на blue/green деплой (build-token-root, без логина)
      - name: триггер деплоя в jenkins
        run: |
          curl -fsS -X POST \
            "https://jenkins.tgops.xyz/buildByToken/buildWithParameters?job=deploy-bot&token=${{ secrets.JENKINS_BUILD_TOKEN }}&IMAGE_SHA=${{ github.sha }}&SKIP_APPROVAL=true"
