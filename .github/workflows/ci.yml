name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  lint:
    name: Линтер
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1

  test:
    name: Тесты
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tgops
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: tgops_test
        options: >-
          --health-cmd "pg_isready -U tgops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Загрузка зависимостей
        run: go mod download

      - name: Запуск тестов
        run: go test -race -coverprofile=coverage.out ./...
        env:
          TEST_DATABASE_DSN: postgres://tgops:testpass@localhost:5432/tgops_test?sslmode=disable

      - name: Покрытие кода
        run: go tool cover -func=coverage.out

  build:
    name: Сборка
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: go build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/tgops

  docker:
    name: Docker сборка
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -f deployments/Dockerfile -t tgops:${{ github.sha }} .
