# =============================
# tgOPS - пример конфигурации #
# =============================

# - Telegram бот -
telegram:
  token: "YOUR_BOT_TOKEN_HERE"
  initial_admin_id: 123456789
  mode: "polling"
  webhook:
    url: "https://yourdomain.com/webhook"
    port: 8443
    cert_path: ""
    key_path: ""

# - База данных PostgreSQL -
database:
  primary:
    # локальный запуск: localhost, docker compose: postgres
    host: "localhost"
    port: 5432
    user: "tgops"
    password: "YOUR_DB_PASSWORD"
    name: "tgops"
    ssl_mode: "disable"
    max_open_conns: 20
    max_idle_conns: 5
    conn_lifetime: "5m"
  replica:
    host: ""
    port: 5432
    user: "tgops_ro"
    password: ""
    name: "tgops"
    ssl_mode: "disable"

# - Логирование -
logger:
  level: "info"
  format: "json"
  output: "stdout"

# - SSH подключения к серверам -
ssh:
  # локальный запуск: keys, docker compose: /app/keys
  keys_dir: "keys"
  default_key_path: ""
  connect_timeout: "10s"
  command_timeout: "30s"
  max_connections_per_host: 3
  servers:
    - name: "vps-main"
      host: "1.2.3.4"
      port: 22
      user: "deploy"
      key_name: "vps-main"
    - name: "gcp-vm-01"
      host: "34.56.78.90"
      port: 22
      user: "ubuntu"
      key_name: "gcp-vm-01"

# - Мониторинг и алерты -
monitoring:
  interval: "60s"
  thresholds:
    cpu_warning: 80
    cpu_critical: 90
    ram_warning: 75
    ram_critical: 85
    disk_warning: 80
    disk_critical: 90
  alert_cooldown: "10m"

# - Уведомления -
notify:
  chat_id: 123456789

# - SSL проверки -
ssl:
  domains:
    - "yourdomain.com"
    - "api.yourdomain.com"
  warn_days: [30, 14, 7, 1]
  check_interval: "24h"

# - HTTP URL проверки -
health_checks:
  interval: "60s"
  timeout: "10s"
  endpoints:
    - name: "api"
      url: "https://yourdomain.com/health"
      expected_status: 200
    - name: "grafana"
      url: "http://localhost:3000"
      expected_status: 200

# - Модуль логов -
logs:
  allowed_services:
    - "nginx"
    - "docker"
    - "ssh"
    - "tgops"
  max_lines: 100
  max_message_chars: 4096

# - Docker -
docker:
  host: "unix:///var/run/docker.sock"
  timeout: "30s"

# - CI/CD webhook приёмник -
cicd:
  webhook_port: 8080
  webhook_secret: "YOUR_WEBHOOK_SECRET"
  notify_chat_id: 123456789

# - Ansible -
ansible:
  binary: "ansible-playbook"
  inventory_path: "/etc/ansible/hosts"
  playbooks_dir: "/opt/ansible/playbooks"
  allowed_playbooks:
    - "deploy-app.yml"
    - "update-packages.yml"
  allowed_modules:
    - "ping"
    - "setup"
    - "service"

# - Terraform -
terraform:
  binary: "terraform"
  working_dir: "/opt/terraform/infra"
  apply_requires_admin: true
  drift_check_interval: "6h"

# - Планировщик отчётов -
scheduler:
  timezone: "Europe/Moscow"
  daily_health_cron: "0 9 * * *"
  weekly_audit_cron: "0 10 * * 1"
