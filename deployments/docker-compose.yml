services:

  # - PostgreSQL primary -
  postgres:
    image: postgres:16-alpine
    container_name: tgops-postgres
    env_file: ../.env
    environment:
      POSTGRES_USER: tgops
      POSTGRES_DB: tgops
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5477:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgops -d tgops"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - tgops-net

  # - tgOPS бот -
  tgops:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: tgops-bot
    user: "1000:1000"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../configs/config.yaml:/app/config.yaml:ro
      - ../keys:/app/keys:ro
    restart: unless-stopped
    networks:
      - tgops-net

volumes:
  pgdata:

networks:
  tgops-net:
    driver: bridge
